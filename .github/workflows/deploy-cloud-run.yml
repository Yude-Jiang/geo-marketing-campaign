# Deploy GEO Campaign Hub to Google Cloud Run on push to main/master
#
# Required GitHub repository secrets (Settings → Secrets → Actions):
#   GCP_PROJECT_ID          e.g. st-china-ai-force
#   GCP_SA_KEY              JSON key for deploy service account (see docs/deploy-github-cloud-run.md)
#
# Optional repository variables:
#   GCP_REGION              default: asia-east1
#   CLOUD_RUN_SERVICE       default: geo-campaign-hub

name: Deploy to Cloud Run

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: cloud-run-deploy
  cancel-in-progress: true

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION || 'asia-east1' }}
  SERVICE: ${{ vars.CLOUD_RUN_SERVICE || 'geo-campaign-hub' }}

jobs:
  # Build gate — lint + production build must pass before we touch Cloud Run.
  # Catches breakages (e.g. a missing export) before they reach deploy.
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Non-blocking: surfaces lint issues without gating deploy while the
      # existing codebase still has pre-existing lint errors to clean up.
      - name: Lint
        run: npm run lint
        continue-on-error: true

      # Blocking gate: a failed production build must stop the deploy.
      - name: Build
        run: npm run build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Enable required APIs
        run: |
          gcloud services enable run.googleapis.com cloudbuild.googleapis.com \
            secretmanager.googleapis.com artifactregistry.googleapis.com --quiet

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${{ env.SERVICE }}" \
            --source . \
            --region "${{ env.REGION }}" \
            --platform managed \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --timeout 300 \
            --min-instances 0 \
            --max-instances 5 \
            --set-env-vars "GOOGLE_CLOUD_PROJECT=${{ env.PROJECT_ID }}"

      - name: Print service URL
        run: |
          echo "Deployed to:"
          gcloud run services describe "${{ env.SERVICE }}" \
            --region "${{ env.REGION }}" \
            --format 'value(status.url)'
